
<h2 class="sr-only">家庭資產負債表互動式儀表板，包含資產趨勢、配置與月度收支分析（2013–2026）</h2>
<style>
.db{font-family:var(--font-sans);padding:1rem 0}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:18px;font-weight:500;color:var(--color-text-primary);margin:0}
.hdr span{font-size:12px;color:var(--color-text-secondary)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.mc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem}
.ml{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.mv{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.ms{font-size:12px;margin-top:2px}
.up{color:#1D9E75}.dn{color:#E24B4A}
.sec{margin-bottom:2rem}
.st{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px}
.ctrls{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.cb{font-size:12px;padding:3px 12px;cursor:pointer;border:0.5px solid var(--color-border-secondary);border-radius:20px;background:transparent;color:var(--color-text-secondary)}
.cb.on{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.lgd{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px;font-size:12px;color:var(--color-text-secondary)}
.lgd span{display:flex;align-items:center;gap:4px}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cw{position:relative;width:100%}
select{font-size:13px;padding:4px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.tab{font-size:13px;padding:6px 16px;cursor:pointer;border:none;background:transparent;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab.on{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}
.pane{display:none}.pane.on{display:block}
</style>

<div class="db">
<div class="hdr">
  <h1>家庭資產負債儀表板</h1>
  <span id="updLabel">資料截至 2026/04（最新）</span>
</div>

<div class="metrics" id="mRow"></div>

<div class="tabs">
  <button class="tab on" onclick="showTab('trend',this)">資產趨勢</button>
  <button class="tab" onclick="showTab('alloc',this)">資產配置</button>
  <button class="tab" onclick="showTab('monthly',this)">月度收支</button>
</div>

<div id="trend" class="pane on sec">
  <div class="ctrls" id="rCtrl"></div>
  <div class="lgd"><span><span class="ld" style="background:#378ADD"></span>資產淨值（萬元）</span></div>
  <div class="cw" style="height:280px"><canvas id="tC" role="img" aria-label="歷年家庭資產淨值趨勢折線圖，2013至2026年"></canvas></div>
</div>

<div id="alloc" class="pane sec">
  <div class="ctrls" id="aCtrl"></div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start">
    <div style="flex:1;min-width:180px"><div class="cw" style="height:220px"><canvas id="aC" role="img" aria-label="資產配置圓餅圖"></canvas></div></div>
    <div id="aLgd" style="flex:1;min-width:160px;padding-top:8px;font-size:13px"></div>
  </div>
</div>

<div id="monthly" class="pane sec">
  <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap">
    <select id="ySel" onchange="renderMonthly()"></select>
    <div class="lgd" style="margin:0">
      <span><span class="ld" style="background:#1D9E75"></span>收入</span>
      <span><span class="ld" style="background:#E24B4A"></span>支出</span>
      <span><span class="ld" style="background:#378ADD;border-radius:50%;width:8px;height:8px"></span>結餘</span>
    </div>
  </div>
  <div class="cw" style="height:240px"><canvas id="mC" role="img" aria-label="月度收支長條圖"></canvas></div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  {m:"202603",net:23717290,cash:606168,stocks:20151534,usstocks:1326202,funds:377884,forex:117157,inc:77000,exp:59120},
];

let rng='all', aYear=null, tCI=null, aCI=null, mCI=null;
const tw=n=>Math.round(Math.abs(n)/10000)+'萬';
const tw2=n=>(n/10000).toFixed(0);

function showTab(id,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(id).classList.add('on');
}

function getRange(){
  if(rng==='all') return DATA;
  const lastY=parseInt(DATA[DATA.length-1].m.slice(0,4));
  const cutY=lastY-parseInt(rng)+1;
  return DATA.filter(d=>parseInt(d.m.slice(0,4))>=cutY);
}

function renderMetrics(){
  const L=DATA[DATA.length-1], P=DATA[DATA.length-2], F=DATA[0];
  const chg=(L.net-P.net)/P.net*100;
  const tot=(L.net-F.net)/Math.abs(F.net)*100;
  const y26=DATA.filter(d=>d.m.startsWith('202'));
  const avgS=y26.length?y26.reduce((s,d)=>s+(d.inc-d.exp),0)/y26.length:0;
  document.getElementById('mRow').innerHTML=`
    <div class="mc"><div class="ml">最新資產淨值</div><div class="mv">${(L.net/10000).toFixed(0)}萬</div><div class="ms ${chg>=0?'up':'dn'}">${chg>=0?'▲':'▼'}${Math.abs(chg).toFixed(1)}% 較上月</div></div>
    <div class="mc"><div class="ml">最新月份</div><div class="mv">${L.m.slice(0,4)}/${L.m.slice(4,6)}</div><div class="ms" style="color:var(--color-text-secondary)">現金 ${tw(L.cash)}</div></div>
    <div class="mc"><div class="ml">累計成長</div><div class="mv">${tot.toFixed(0)}%</div><div class="ms" style="color:var(--color-text-secondary)">自 2013 起</div></div>
    <div class="mc"><div class="ml">近期月均結餘</div><div class="mv">${tw(Math.abs(avgS))}</div><div class="ms ${avgS>=0?'up':'dn'}">${avgS>=0?'正結餘':'負結餘'}</div></div>
  `;
}

function renderRangeCtrl(){
  document.getElementById('rCtrl').innerHTML=[['3','近3年'],['5','近5年'],['10','近10年'],['all','全部']].map(([v,l])=>
    `<button class="cb ${rng===v?'on':''}" onclick="rng='${v}';renderRangeCtrl();renderTrend()">${l}</button>`
  ).join('');
}

function renderTrend(){
  const d=getRange();
  const labels=d.map(r=>r.m.slice(0,4)+'/'+r.m.slice(4,6));
  const vals=d.map(r=>parseInt(tw2(r.net)));
  if(tCI) tCI.destroy();
  tCI=new Chart(document.getElementById('tC').getContext('2d'),{
    type:'line',
    data:{labels,datasets:[{label:'資產淨值（萬）',data:vals,borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.07)',borderWidth:2,pointRadius:d.length>40?0:3,pointBackgroundColor:'#1D9E75',fill:true,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{autoSkip:true,maxTicksLimit:10,maxRotation:45,font:{size:11},color:'#888780'},grid:{display:false}},
        y:{ticks:{callback:v=>v+'萬',font:{size:11},color:'#888780'},grid:{color:'rgba(136,135,128,0.12)'}}
      }
    }
  });
}

function renderAllocCtrl(){
  const years=[...new Set(DATA.map(d=>d.m.slice(0,4)))];
  if(!aYear) aYear=years[years.length-1];
  document.getElementById('aCtrl').innerHTML=years.slice(-6).map(y=>
    `<button class="cb ${aYear===y?'on':''}" onclick="aYear='${y}';renderAllocCtrl();renderAlloc()">${y}</button>`
  ).join('');
}

function renderAlloc(){
  const yd=DATA.filter(d=>d.m.startsWith(aYear));
  if(!yd.length) return;
  const L=yd[yd.length-1];
  const items=[
    {l:'台股',v:L.stocks,c:'#378ADD'},
    {l:'美股',v:L.usstocks,c:'#534AB7'},
    {l:'基金',v:L.funds,c:'#1D9E75'},
    {l:'現金活存',v:L.cash,c:'#BA7517'},
    {l:'外幣',v:L.forex,c:'#D4537E'},
  ].filter(i=>i.v>0);
  const tot=items.reduce((s,i)=>s+i.v,0);
  if(aCI) aCI.destroy();
  aCI=new Chart(document.getElementById('aC').getContext('2d'),{
    type:'doughnut',
    data:{labels:items.map(i=>i.l),datasets:[{data:items.map(i=>Math.round(i.v)),backgroundColor:items.map(i=>i.c),borderWidth:2,borderColor:'transparent'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'62%'}
  });
  document.getElementById('aLgd').innerHTML=items.map(i=>{
    const p=(i.v/tot*100).toFixed(1);
    return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
      <span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:2px;background:${i.c};flex-shrink:0"></span>${i.l}</span>
      <span style="color:var(--color-text-secondary);text-align:right">${p}%<br><span style="font-size:11px">${tw(i.v)}</span></span>
    </div>`;
  }).join('');
}

function renderMonthlySelector(){
  const yrs=[...new Set(DATA.map(d=>d.m.slice(0,4)))].sort((a,b)=>b-a);
  document.getElementById('ySel').innerHTML=yrs.map(y=>`<option value="${y}">${y} 年</option>`).join('');
}

function renderMonthly(){
  const y=document.getElementById('ySel').value;
  const d=DATA.filter(r=>r.m.startsWith(y));
  const labels=d.map(r=>parseInt(r.m.slice(4,6))+'月');
  if(mCI) mCI.destroy();
  mCI=new Chart(document.getElementById('mC').getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'收入',data:d.map(r=>Math.round(r.inc/10000)),backgroundColor:'rgba(29,158,117,0.75)',borderWidth:0},
      {label:'支出',data:d.map(r=>Math.round(r.exp/10000)),backgroundColor:'rgba(226,75,74,0.75)',borderWidth:0},
      {label:'結餘',data:d.map(r=>Math.round((r.inc-r.exp)/10000)),type:'line',borderColor:'#378ADD',backgroundColor:'transparent',borderWidth:2,pointRadius:3,pointBackgroundColor:'#378ADD'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:0,font:{size:11},color:'#888780'},grid:{display:false}},
        y:{ticks:{callback:v=>v+'萬',font:{size:11},color:'#888780'},grid:{color:'rgba(136,135,128,0.12)'}}
      }
    }
  });
}

renderMetrics();
renderRangeCtrl();
renderTrend();
renderAllocCtrl();
renderAlloc();
renderMonthlySelector();
renderMonthly();
</script>
